# MongoDB ? connects to your local MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/indiapost

# Server runs on port 8080
server.port=8080

# JWT secret key ? use any long random string, keep it secret
jwt.secret=indiapost-super-secret-key-2026-make-this-very-long
# Token expires after 24 hours (in milliseconds)
jwt.expiration=86400000

# Python ML service URL
ml.service.url=http://localhost:8000

# Allow file uploads up to 10MB
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
